version: '3.8'

# Створюємо іменовану мережу, до якої пізніше підключиться фронтенд
networks:
  platform_network:
    name: platform_network
    driver: bridge

services:
  # Container 1: Oracle Database
  database:
    image: gvenzl/oracle-free:latest
    container_name: llm_platform_db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=@8ffzPFnUbfM
      - ORACLE_HOSTNAME=localhost
    volumes:
      - ./database/data:/user/gvenzl/oradata
      - ./database/schema.sql:/container-entrypoint-initdb.d/schema.sql
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "rc=0; echo 'exit' | sqlplus -L sys/my_oracle_strong_password@localhost:1521/FREE as sysdba || rc=$$?; [ $$rc -eq 0 ]"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always

  # Container 2: Node.js & Express API
  backend:
    build:
      context: ./backend # Контекст - поточна папка бекенду
      dockerfile: Dockerfile.dev
    container_name: llm_platform_api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - HOST=0.0.0.0
      - DB_USER=AI_MENTOR
      - DB_PASSWORD=@8ffzPFnUbfM
      - DB_CONNECT_STRING=database:1521/FREEPDB1 # Вказує на контейнер БД
      - JWT_SECRET=r_gL46P*Yd*GgvBEyd.yM3DX_upqyanZ
      - FRONTEND_URL=http://localhost:3001,http://localhost:3002
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - platform_network
    depends_on:
      database:
        condition: service_healthy # Чекаємо, поки БД повністю запуститься
    restart: always

  # Container 3: Web Server & Interface Renderer (EJS UI)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm_platform_ui
    ports:
      - "3000:3000"                          # Accessible via http://localhost:3000
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_URL=http://backend:5000/api   # Direct container-to-container routing string
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - platform_network
    depends_on:
      - backend
    restart: always