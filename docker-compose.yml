version: '3.8'

networks:
  platform_network:
    name: platform_network
    driver: bridge

services:
  database:
    # Заміна на перевірений та стабільний образ Oracle 21c XE
    image: gvenzl/oracle-free:latest
    container_name: llm_platform_db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${DB_PASSWORD}
      - ORACLE_HOSTNAME=localhost
    volumes:
      - ./database/data:/opt/oracle/oradata
      # У цьому образі папка для автоматичних скриптів трохи інша:
      - ./database/schema.sql:/container-entrypoint-initdb.d/schema.sql
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "rc=0; echo 'exit' | sqlplus -L sys/${DB_PASSWORD}@localhost:1521/FREE as sysdba || rc=$$?; [ $$rc -eq 0 ]"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: llm_platform_rmq
    ports:
      - "5672:5672"   # Стандартний порт для підключення
      - "15672:15672" # UI панель керування (admin/admin)
    networks:
      - platform_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- 3. PYTHON WORKER (НОВИЙ) ---
  cert_worker:
    build:
      context: ./worker # Папка з кодом воркера
    container_name: llm_platform_cert_worker
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672/
    volumes:
      - certs_volume:/app/certs # Спільна папка для сертифікатів
    networks:
      - platform_network
    depends_on:
      rabbitmq:
        condition: service_healthy # Чекаємо на запуск RabbitMQ
    restart: always

  # Container 2: Business Logic & Data Repositories (Express API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm_platform_api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_CONNECT_STRING=${DB_CONNECT_STRING} # References the 'database' service container name
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://rabbitmq:5672/
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - certs_volume:/usr/src/app/certs
    networks:
      - platform_network
    depends_on:
      database:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: always

  # Container 3: Web Server & Interface Renderer (EJS UI)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm_platform_ui
    ports:
      - "3000:3000"                          # Accessible via http://localhost:3000
    environment:
      - NODE_ENV=development
      - PORT=3000
      - API_URL=http://backend:5000/api   # Direct container-to-container routing string
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - platform_network
    depends_on:
      - backend
    restart: always

volumes:
  certs_volume: